<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos — Admin</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 220px;
            background: var(--escuro);
            padding: 24px 0;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
        }

        .sidebar .logo {
            color: var(--laranja);
            font-size: 1.1rem;
            font-weight: 700;
            padding: 0 24px 24px;
            border-bottom: 1px solid #333;
            text-decoration: none;
        }

        .sidebar nav {
            margin-top: 16px;
            flex: 1;
        }

        .sidebar nav a {
            display: block;
            color: #ccc;
            text-decoration: none;
            padding: 12px 24px;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .sidebar nav a:hover,
        .sidebar nav a.ativo {
            background: #2a2a2a;
            color: var(--laranja);
        }

        .sidebar .btn-sair {
            padding: 12px 24px;
            color: #999;
            cursor: pointer;
            font-size: 0.9rem;
            background: none;
            border: none;
            text-align: left;
            font-family: 'Poppins', sans-serif;
        }

        .sidebar .btn-sair:hover {
            color: #ff4444;
        }

        .conteudo {
            margin-left: 220px;
            padding: 32px;
            flex: 1;
            width: 100%;
        }

        .topo {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .topo h1 {
            font-size: 1.5rem;
        }

        .btn-fechar-dia {
            background: #C62828;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-fechar-dia:hover {
            background: #B71C1C;
        }

        .btn-abrir-dia {
            background: var(--verde);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
        }

        /* Filtros */
        .filtros {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .btn-filtro {
            padding: 7px 16px;
            border: 2px solid var(--cinza-medio);
            background: transparent;
            border-radius: 20px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-filtro:hover,
        .btn-filtro.ativo {
            border-color: var(--laranja);
            color: var(--laranja);
            background: #FFF3E0;
        }

        /* Banner loja fechada */
        .banner-fechado {
            display: none;
            background: #FFEBEE;
            border: 2px solid #C62828;
            border-radius: 10px;
            padding: 14px 20px;
            margin-bottom: 20px;
            color: #C62828;
            font-weight: 600;
            font-size: 0.95rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--branco);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        th {
            text-align: left;
            padding: 12px 16px;
            background: var(--cinza-claro);
            font-size: 0.85rem;
            color: #666;
        }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--cinza-medio);
            font-size: 0.9rem;
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        select.status-select {
            padding: 6px 10px;
            border: 1px solid var(--cinza-medio);
            border-radius: 6px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge-pendente {
            background: #FFF3E0;
            color: #E65100;
        }

        .badge-confirmado {
            background: #E3F2FD;
            color: #1565C0;
        }

        .badge-entregue {
            background: #E8F5E9;
            color: #2E7D32;
        }

        .badge-cancelado {
            background: #FFEBEE;
            color: #C62828;
        }

        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }

            .conteudo {
                margin-left: 0;
                padding: 16px;
            }

            table {
                font-size: 0.8rem;
            }

            th,
            td {
                padding: 8px;
            }
        }
    </style>
</head>

<body>

    <aside class="sidebar">
        <a href="index.html" class="logo">🍔 Admin</a>
        <nav>
            <a href="index.html">📊 Dashboard</a>
            <a href="produtos.html">🍔 Produtos</a>
            <a href="pedidos.html" class="ativo">📋 Pedidos</a>
        </nav>
        <button class="btn-sair" onclick="sairAdmin()">🚪 Sair</button>
    </aside>

    <div class="conteudo">
        <div class="topo">
            <h1>📋 Pedidos</h1>
            <div style="display:flex; gap:10px; align-items:center;">
                <span id="status-loja" style="font-size:0.9rem; color:#666;"></span>
                <button id="btn-toggle-loja" class="btn-fechar-dia" onclick="toggleLoja()">🔴 Fechar loja</button>
            </div>
        </div>

        <div class="banner-fechado" id="banner-fechado">
            🔴 Loja fechada — novos pedidos estão bloqueados para os clientes.
        </div>

        <div class="filtros">
            <button class="btn-filtro ativo" onclick="filtrar('todos', event)">Todos</button>
            <button class="btn-filtro" onclick="filtrar('pendente', event)">⏳ Pendente</button>
            <button class="btn-filtro" onclick="filtrar('confirmado', event)">✅ Confirmado</button>
            <button class="btn-filtro" onclick="filtrar('entregue', event)">🎉 Entregue</button>
            <button class="btn-filtro" onclick="filtrar('cancelado', event)">❌ Cancelado</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Cliente</th>
                    <th>Total</th>
                    <th>Modalidade</th>
                    <th>Pagamento</th>
                    <th>Data</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="tabela-body">
                <tr>
                    <td colspan="7">Carregando...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="../js/api.js"></script>
    <script>
        if (!localStorage.getItem('adminToken')) {
            window.location.href = 'login.html';
        }

        function sairAdmin() {
            localStorage.removeItem('adminToken');
            localStorage.removeItem('adminNome');
            window.location.href = 'login.html';
        }

        async function adminFetch(rota, opcoes = {}) {
            const token = localStorage.getItem('adminToken');
            const headers = {
                'Content-Type': 'application/json',
                Authorization: `Bearer ${token}`,
                ...opcoes.headers,
            };
            const response = await fetch(`http://localhost:3000${rota}`, { ...opcoes, headers });
            const data = await response.json();
            if (!response.ok) throw new Error(data.erro || 'Erro');
            return data;
        }

        let todosPedidos = [];
        let filtroAtual = 'todos';

        async function carregarPedidos() {
            try {
                todosPedidos = await adminFetch('/api/orders');
                renderizarTabela();
            } catch (error) {
                console.error(error);
            }
        }

        function renderizarTabela() {
            const tbody = document.getElementById('tabela-body');
            const lista = filtroAtual === 'todos'
                ? todosPedidos
                : todosPedidos.filter(p => p.status === filtroAtual);

            if (lista.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; color:#999; padding:24px;">Nenhum pedido encontrado.</td></tr>`;
                return;
            }

            const pagMap = { debito: '💳 Débito', credito: '💳 Crédito', dinheiro: '💵 Dinheiro' };

            tbody.innerHTML = lista.map(p => `
      <tr>
        <td><strong>#${p.id}</strong></td>
        <td>${p.cliente}</td>
        <td>R$ ${parseFloat(p.total).toFixed(2)}</td>
        <td>${p.modalidade === 'retirada' ? '🏪 Retirada' : '🛵 Entrega'}</td>
        <td>${pagMap[p.pagamento] || p.pagamento || '—'}</td>
        <td>${new Date(p.criado_em).toLocaleString('pt-BR')}</td>
        <td>
          <select class="status-select" onchange="atualizarStatus(${p.id}, this.value)">
            <option value="pendente"   ${p.status === 'pendente' ? 'selected' : ''}>⏳ Pendente</option>
            <option value="confirmado" ${p.status === 'confirmado' ? 'selected' : ''}>✅ Confirmado</option>
            <option value="entregue"   ${p.status === 'entregue' ? 'selected' : ''}>🎉 Entregue</option>
            <option value="cancelado"  ${p.status === 'cancelado' ? 'selected' : ''}>❌ Cancelado</option>
          </select>
        </td>
      </tr>
    `).join('');
        }

        function filtrar(status, event) {
            filtroAtual = status;
            document.querySelectorAll('.btn-filtro').forEach(b => b.classList.remove('ativo'));
            event.target.classList.add('ativo');
            renderizarTabela();
        }

        async function atualizarStatus(id, status) {
            try {
                await adminFetch(`/api/orders/${id}/status`, {
                    method: 'PUT',
                    body: JSON.stringify({ status }),
                });
                // Atualiza localmente
                const pedido = todosPedidos.find(p => p.id === id);
                if (pedido) pedido.status = status;
            } catch (error) {
                alert('Erro ao atualizar status: ' + error.message);
            }
        }

        // Loja aberta/fechada
        async function verificarStatusLoja() {
            try {
                const dados = await adminFetch('/api/admin/loja-status');
                atualizarBotaoLoja(dados.aberta);
            } catch (e) { }
        }

        async function toggleLoja() {
            const fechada = document.getElementById('btn-toggle-loja').textContent.includes('Fechar');
            if (fechada) {
                if (!confirm('Tem certeza que deseja fechar a loja?')) return;
            }
            try {
                const dados = await adminFetch('/api/admin/loja-status', {
                    method: 'PUT',
                    body: JSON.stringify({ aberta: fechada ? false : true }),
                });
                atualizarBotaoLoja(dados.aberta);
            } catch (e) {
                alert('Erro ao atualizar status da loja.');
            }
        }

        function atualizarBotaoLoja(aberta) {
            const banner = document.getElementById('banner-fechado');
            const btn = document.getElementById('btn-toggle-loja');
            const statusLabel = document.getElementById('status-loja');

            if (aberta) {
                banner.style.display = 'none';
                btn.textContent = '🔴 Fechar loja';
                btn.className = 'btn-fechar-dia';
                statusLabel.textContent = '🟢 Loja aberta';
            } else {
                banner.style.display = 'block';
                btn.textContent = '🟢 Abrir loja';
                btn.className = 'btn-abrir-dia';
                statusLabel.textContent = '🔴 Loja fechada';
            }
        }

        verificarStatusLoja();
        carregarPedidos();

        // Atualiza pedidos a cada 30 segundos
        setInterval(carregarPedidos, 30000);
    </script>

</body>

</html>
