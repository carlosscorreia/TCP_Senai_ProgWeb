<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/yx9TyZnn/Design-sem-nome-(4).png">
    <style>
        body {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 220px;
            background: var(--escuro);
            padding: 24px 0;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
        }

        .sidebar .logo {
            color: var(--laranja);
            font-size: 1.1rem;
            font-weight: 700;
            padding: 0 24px 24px;
            border-bottom: 1px solid #333;
            text-decoration: none;
        }

        .sidebar nav {
            margin-top: 16px;
            flex: 1;
        }

        .sidebar nav a {
            display: block;
            color: #ccc;
            text-decoration: none;
            padding: 12px 24px;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .sidebar nav a:hover,
        .sidebar nav a.ativo {
            background: #2a2a2a;
            color: var(--laranja);
        }

        .sidebar .btn-sair {
            padding: 12px 24px;
            color: #999;
            cursor: pointer;
            font-size: 0.9rem;
            background: none;
            border: none;
            text-align: left;
            font-family: 'Poppins', sans-serif;
        }

        .sidebar .btn-sair:hover {
            color: #ff4444;
        }

        .conteudo {
            margin-left: 220px;
            padding: 32px;
            flex: 1;
            width: 100%;
        }

        .conteudo h1 {
            font-size: 1.5rem;
            color: var(--texto);
            margin-bottom: 8px;
        }

        .conteudo p.subtitulo {
            color: #999;
            margin-bottom: 32px;
            font-size: 0.9rem;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card-stat {
            background: var(--branco);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            border-left: 4px solid var(--laranja);
        }

        .card-stat .valor {
            font-size: 2rem;
            font-weight: 700;
            color: var(--laranja);
        }

        .card-stat .label {
            font-size: 0.85rem;
            color: #999;
            margin-top: 4px;
        }

        .tabela-vendas {
            background: var(--branco);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .tabela-vendas h2 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 10px 12px;
            background: var(--cinza-claro);
            font-size: 0.85rem;
            color: #666;
        }

        td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--cinza-medio);
            font-size: 0.9rem;
        }

        tr:last-child td {
            border-bottom: none;
        }

        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }

            .conteudo {
                margin-left: 0;
                padding: 16px;
            }
        }
    </style>
</head>

<body>

    <aside class="sidebar">
        <a href="index.html" class="logo"> Admin</a>
        <nav>
            <a href="index.html" class="ativo"> Dashboard</a>
            <a href="produtos.html"> Produtos</a>
            <a href="pedidos.html"> Pedidos</a>
        </nav>
        <button class="btn-sair" onclick="sairAdmin()"> Sair</button>
    </aside>

    <div class="conteudo">
        <h1>Dashboard</h1>
        <p class="subtitulo" id="subtitulo">Carregando...</p>

        <div class="cards-grid">
            <div class="card-stat">
                <div class="valor" id="pedidos-hoje">—</div>
                <div class="label">Pedidos hoje</div>
            </div>
            <div class="card-stat">
                <div class="valor" id="faturamento-hoje">—</div>
                <div class="label">Faturamento hoje</div>
            </div>
            <div class="card-stat">
                <div class="valor" id="total-produtos">—</div>
                <div class="label">Produtos ativos</div>
            </div>
        </div>

        <div class="tabela-vendas">
            <h2>📈 Vendas dos últimos 7 dias</h2>
            <table>
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Pedidos</th>
                        <th>Faturamento</th>
                    </tr>
                </thead>
                <tbody id="tabela-body">
                    <tr>
                        <td colspan="3">Carregando...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script>
        // Proteção da página
        if (!localStorage.getItem('adminToken')) {
            window.location.href = 'login.html';
        }

        function sairAdmin() {
            localStorage.removeItem('adminToken');
            localStorage.removeItem('adminNome');
            window.location.href = 'login.html';
        }

        // Sobrescreve apiFetch para usar token admin
        async function adminFetch(rota, opcoes = {}) {
            const token = localStorage.getItem('adminToken');
            const headers = {
                'Content-Type': 'application/json',
                Authorization: `Bearer ${token}`,
                ...opcoes.headers,
            };
            const response = await fetch(`https://lanchonete-backend-qs4d.onrender.com${rota}`, { ...opcoes, headers });
            const data = await response.json();
            if (!response.ok) throw new Error(data.erro || 'Erro');
            return data;
        }

        async function carregarDashboard() {
            try {
                const dados = await adminFetch('/api/admin/dashboard');

                document.getElementById('pedidos-hoje').textContent = dados.pedidosHoje;
                document.getElementById('faturamento-hoje').textContent =
                    `R$ ${parseFloat(dados.faturamentoHoje).toFixed(2)}`;
                document.getElementById('total-produtos').textContent = dados.totalProdutos;

                const nome = localStorage.getItem('adminNome');
                document.getElementById('subtitulo').textContent =
                    `Bem-vindo, ${nome}! Aqui está o resumo de hoje.`;

                const tbody = document.getElementById('tabela-body');
                if (dados.vendasPorDia.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3">Nenhuma venda registrada ainda.</td></tr>';
                } else {
                    tbody.innerHTML = dados.vendasPorDia.map(v => `
          <tr>
            <td>${new Date(v.dia).toLocaleDateString('pt-BR')}</td>
            <td>${v.pedidos}</td>
            <td>R$ ${parseFloat(v.faturamento).toFixed(2)}</td>
          </tr>
        `).join('');
                }
            } catch (error) {
                console.error(error);
            }
        }

        carregarDashboard();

    </script>

</body>

</html>
