<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lanchonete Express</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .topo-loja {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 24px 32px;
      background-color: #fff;
      border-bottom: 1px solid #eee;
    }

    .topo-loja .logo-img {
      width: 130px;
      height: 130px;
      object-fit: cover;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.18);
      background-color: #f5a623;
    }

    .topo-loja .loja-info h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a1a1a;
      margin: 0 0 6px 0;
    }

    .topo-loja .loja-info .status {
      color: #2a8a2a;
      font-size: 0.95rem;
      margin: 0;
    }
  </style>
</head>

<body>

  <header>
    <a href="index.html" class="logo">
      <img src="https://i.postimg.cc/43w72SzM/logo.avif" alt="Logo"
        style="height:38px; border-radius:8px; vertical-align:middle;">
    </a>
    <nav>
      <a href="index.html">Cardápio</a>
      <a href="meus-pedidos.html" id="nav-pedidos" style="display:none;">Meus Pedidos</a>
      <a href="login.html" id="nav-login">Entrar</a>
      <a href="cadastro.html" id="nav-cadastro">Cadastrar</a>
      <a href="#" id="nav-logout" style="display:none;" onclick="logout()">Sair</a>
      <a href="carrinho.html" class="carrinho-icon">
        🛒 <span class="carrinho-contador" id="contador-carrinho">0</span>
      </a>
    </nav>
  </header>

  <!-- Topo com logo grande, nome e info da loja -->
  <section class="topo-loja">
    <img class="logo-img" src="https://i.postimg.cc/43w72SzM/logo.avif" alt="Logo Burguer Lanchonete">
    <div class="loja-info">
      <h1>Burguer lanchonete</h1>
      <p class="status">Aberto até às 23h00 • Feira de Santana - BA • Mais informações</p>
    </div>
  </section>

  <main>
    <div class="categorias" id="categorias">
      <button class="btn-categoria ativo" onclick="filtrarCategoria('todas', event)">Todos</button>
    </div>

    <div class="produtos-grid" id="produtos-grid">
      <p>Carregando produtos...</p>
    </div>
  </main>

  <footer>
    <p>Buguer Lanchonete © 2026 - Todos os direitos reservados.</p>
    <div class="rodape">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-instagram"
        viewBox="0 0 16 16">
        <path
          d="M8 0C5.829 0 5.556.01 4.703.048 3.85.088 3.269.222 2.76.42a3.9 3.9 0 0 0-1.417.923A3.9 3.9 0 0 0 .42 2.76C.222 3.268.087 3.85.048 4.7.01 5.555 0 5.827 0 8.001c0 2.172.01 2.444.048 3.297.04.852.174 1.433.372 1.942.205.526.478.972.923 1.417.444.445.89.719 1.416.923.51.198 1.09.333 1.942.372C5.555 15.99 5.827 16 8 16s2.444-.01 3.298-.048c.851-.04 1.434-.174 1.943-.372a3.9 3.9 0 0 0 1.416-.923c.445-.445.718-.891.923-1.417.197-.509.332-1.09.372-1.942C15.99 10.445 16 10.173 16 8s-.01-2.445-.048-3.299c-.04-.851-.175-1.433-.372-1.941a3.9 3.9 0 0 0-.923-1.417A3.9 3.9 0 0 0 13.24.42c-.51-.198-1.092-.333-1.943-.372C10.443.01 10.172 0 7.998 0zm-.717 1.442h.718c2.136 0 2.389.007 3.232.046.78.035 1.204.166 1.486.275.373.145.64.319.92.599s.453.546.598.92c.11.281.24.705.275 1.485.039.843.047 1.096.047 3.231s-.008 2.389-.047 3.232c-.035.78-.166 1.203-.275 1.485a2.5 2.5 0 0 1-.599.919c-.28.28-.546.453-.92.598-.28.11-.704.24-1.485.276-.843.038-1.096.047-3.232.047s-2.39-.009-3.233-.047c-.78-.036-1.203-.166-1.485-.276a2.5 2.5 0 0 1-.92-.598 2.5 2.5 0 0 1-.6-.92c-.109-.281-.24-.705-.275-1.485-.038-.843-.046-1.096-.046-3.233s.008-2.388.046-3.231c.036-.78.166-1.204.276-1.486.145-.373.319-.64.599-.92s.546-.453.92-.598c.282-.11.705-.24 1.485-.276.738-.034 1.024-.044 2.515-.045zm4.988 1.328a.96.96 0 1 0 0 1.92.96.96 0 0 0 0-1.92m-4.27 1.122a4.109 4.109 0 1 0 0 8.217 4.109 4.109 0 0 0 0-8.217m0 1.441a2.667 2.667 0 1 1 0 5.334 2.667 2.667 0 0 1 0-5.334" />
      </svg>
    </div>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/carrinho.js"></script>
  <script>
    let todosProdutos = [];

    async function carregarMeusPedidos() {
      const token = localStorage.getItem('token');
      if (!token) return;

      try {
        const pedidos = await apiFetch('/api/orders/my');
        const section = document.getElementById('meus-pedidos-section');
        const lista = document.getElementById('meus-pedidos-lista');

        if (pedidos.length === 0) return;

        section.style.display = 'block';

        lista.innerHTML = pedidos.slice(0, 3).map(p => `
      <div class="pedido-card">
        <div class="pedido-card-info">
          <h3>Pedido #${p.id} — R$ ${parseFloat(p.total).toFixed(2)}</h3>
          <p>${new Date(p.criado_em).toLocaleString('pt-BR')} · ${p.modalidade === 'retirada' ? '🏪 Retirada' : '🛵 Entrega'}</p>
        </div>
        <div class="pedido-card-acoes">
          <span class="badge-status badge-${p.status}">${p.status}</span>
          <button class="btn btn-outline" style="padding:6px 14px; font-size:0.85rem;"
            onclick="pedirNovamente(${p.id})">🔁 Pedir novamente</button>
        </div>
      </div>
    `).join('');

      } catch (e) { }
    }

    async function pedirNovamente(pedidoId) {
      try {
        const itens = await apiFetch(`/api/orders/${pedidoId}`);
        const produtos = await apiFetch('/api/products');

        itens.forEach(item => {
          const produto = produtos.find(p => p.id === item.produto_id);
          if (produto) adicionarAoCarrinho(produto, new Event('click'));
        });

        window.location.href = 'carrinho.html';
      } catch (e) {
        alert('Erro ao recriar pedido.');
      }
    }

    carregarMeusPedidos();

    async function carregarProdutos() {
      try {
        const produtos = await apiFetch('/api/products');
        todosProdutos = produtos;
        renderizarCategorias(produtos);
        renderizarProdutos(produtos);
      } catch (error) {
        document.getElementById('produtos-grid').innerHTML =
          '<p style="padding:32px;">Erro ao carregar produtos. Tente novamente.</p>';
      }
    }

    function renderizarCategorias(produtos) {
      const categorias = [...new Set(produtos.map(p => p.categoria))];
      const container = document.getElementById('categorias');
      categorias.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'btn-categoria';
        btn.textContent = cat;
        btn.onclick = (e) => filtrarCategoria(cat, e);
        container.appendChild(btn);
      });
    }

    function filtrarCategoria(categoria, event) {
      document.querySelectorAll('.btn-categoria').forEach(b => b.classList.remove('ativo'));
      event.target.classList.add('ativo');

      const filtrados = categoria === 'todas'
        ? todosProdutos
        : todosProdutos.filter(p => p.categoria === categoria);

      renderizarProdutos(filtrados);
    }

    function renderizarProdutos(produtos) {
      const grid = document.getElementById('produtos-grid');
      if (produtos.length === 0) {
        grid.innerHTML = '<p style="padding:32px;">Nenhum produto encontrado.</p>';
        return;
      }

      grid.innerHTML = produtos.map(p => `
      <div class="card-produto">
        <img src="${p.imagem_url}" alt="${p.nome}">
        <div class="card-produto-info">
          <h3>${p.nome}</h3>
          <p>${p.descricao}</p>
          <div class="card-produto-preco">
            <div>
              ${p.preco_promocional
          ? `<span class="preco-original">R$ ${parseFloat(p.preco).toFixed(2)}</span>
                   <span class="preco">R$ ${parseFloat(p.preco_promocional).toFixed(2)}</span>`
          : `<span class="preco">R$ ${parseFloat(p.preco).toFixed(2)}</span>`
        }
            </div>
            <button class="btn btn-laranja" onclick='adicionarAoCarrinho(${JSON.stringify(p)}, event)'>
              + Adicionar
            </button>
          </div>
        </div>
      </div>
    `).join('');
    }

    carregarProdutos();

    const navPedidos = document.getElementById('nav-pedidos');
    if (localStorage.getItem('token') && navPedidos) {
      navPedidos.style.display = 'inline';
    }

    async function verificarLojaAberta() {
      try {
        const dados = await apiFetch('/api/admin/loja-status');
        if (!dados.aberta) {
          document.querySelector('main').innerHTML = `
        <div style="text-align:center; padding: 80px 20px;">
          <div style="font-size:4rem;">🔴</div>
          <h2 style="font-size:1.5rem; margin: 16px 0 8px;">Loja fechada</h2>
          <p style="color:#999; font-size:1rem;">Estamos fora do horário de atendimento.<br>Volte mais tarde! 😊</p>
        </div>`;
        }
      } catch (e) { }
    }

    verificarLojaAberta();
  </script>

</body>

</html>
