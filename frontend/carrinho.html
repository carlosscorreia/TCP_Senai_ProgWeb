<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrinho</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="https://i.postimg.cc/43w72SzM/logo.avif">
  <style>
    .carrinho-container {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 16px;
    }

    .carrinho-container h1 {
      font-size: 1.5rem;
      color: var(--laranja);
      margin-bottom: 24px;
    }

    .item-carrinho {
      background: var(--branco);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    .item-carrinho img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 8px;
    }

    .item-info {
      flex: 1;
    }

    .item-info h3 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .item-info p {
      font-size: 0.9rem;
      color: var(--laranja);
      font-weight: 600;
    }

    .item-quantidade {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .item-quantidade button {
      width: 32px;
      height: 32px;
      border: 2px solid var(--laranja);
      background: transparent;
      color: var(--laranja);
      font-size: 1.1rem;
      font-weight: 700;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .item-quantidade button:hover {
      background: var(--laranja);
      color: var(--branco);
    }

    .item-quantidade span {
      font-size: 1rem;
      font-weight: 600;
      min-width: 20px;
      text-align: center;
    }

    .btn-remover {
      background: none;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      color: #999;
      padding: 4px;
    }

    .btn-remover:hover {
      color: #C62828;
    }

    .carrinho-resumo {
      background: var(--branco);
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      margin-top: 24px;
    }

    .resumo-linha {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 0.95rem;
    }

    .resumo-total {
      display: flex;
      justify-content: space-between;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--laranja);
      border-top: 2px solid var(--cinza-medio);
      padding-top: 12px;
      margin-top: 12px;
    }

    .carrinho-vazio {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }

    .carrinho-vazio p {
      font-size: 1.1rem;
      margin-bottom: 20px;
    }

    @media (max-width: 600px) {
      .item-carrinho {
        flex-wrap: wrap;
      }

      .item-carrinho img {
        width: 60px;
        height: 60px;
      }
    }
  </style>
</head>

<body>

  <header>
    <a href="index.html" class="logo">
      <img src="https://i.postimg.cc/43w72SzM/logo.avif" alt="Logo"
        style="height:38px; border-radius:8px; vertical-align:middle;">
    </a>
    <nav>
      <a href="index.html">Cardápio</a>
      <a href="meus-pedidos.html" id="nav-pedidos" style="display:none;">Meus Pedidos</a>
      <a href="login.html" id="nav-login">Entrar</a>
      <a href="cadastro.html" id="nav-cadastro">Cadastrar</a>
      <a href="#" id="nav-logout" style="display:none;" onclick="logout()">Sair</a>
      <a href="carrinho.html" class="carrinho-icon">
        🛒 <span class="carrinho-contador" id="contador-carrinho">0</span>
      </a>
    </nav>
  </header>

  <main>
    <div class="carrinho-container">
      <h1>🛒 Meu Carrinho</h1>
      <div id="carrinho-conteudo"></div>
    </div>
  </main>

  <footer>
    <p>Buguer Lanchonete © 2026 - Todos os direitos reservados.</p>
    <div class="rodape">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-instagram"
        viewBox="0 0 16 16">
        <path
          d="M8 0C5.829 0 5.556.01 4.703.048 3.85.088 3.269.222 2.76.42a3.9 3.9 0 0 0-1.417.923A3.9 3.9 0 0 0 .42 2.76C.222 3.268.087 3.85.048 4.7.01 5.555 0 5.827 0 8.001c0 2.172.01 2.444.048 3.297.04.852.174 1.433.372 1.942.205.526.478.972.923 1.417.444.445.89.719 1.416.923.51.198 1.09.333 1.942.372C5.555 15.99 5.827 16 8 16s2.444-.01 3.298-.048c.851-.04 1.434-.174 1.943-.372a3.9 3.9 0 0 0 1.416-.923c.445-.445.718-.891.923-1.417.197-.509.332-1.09.372-1.942C15.99 10.445 16 10.173 16 8s-.01-2.445-.048-3.299c-.04-.851-.175-1.433-.372-1.941a3.9 3.9 0 0 0-.923-1.417A3.9 3.9 0 0 0 13.24.42c-.51-.198-1.092-.333-1.943-.372C10.443.01 10.172 0 7.998 0zm-.717 1.442h.718c2.136 0 2.389.007 3.232.046.78.035 1.204.166 1.486.275.373.145.64.319.92.599s.453.546.598.92c.11.281.24.705.275 1.485.039.843.047 1.096.047 3.231s-.008 2.389-.047 3.232c-.035.78-.166 1.203-.275 1.485a2.5 2.5 0 0 1-.599.919c-.28.28-.546.453-.92.598-.28.11-.704.24-1.485.276-.843.038-1.096.047-3.232.047s-2.39-.009-3.233-.047c-.78-.036-1.203-.166-1.485-.276a2.5 2.5 0 0 1-.92-.598 2.5 2.5 0 0 1-.6-.92c-.109-.281-.24-.705-.275-1.485-.038-.843-.046-1.096-.046-3.233s.008-2.388.046-3.231c.036-.78.166-1.204.276-1.486.145-.373.319-.64.599-.92s.546-.453.92-.598c.282-.11.705-.24 1.485-.276.738-.034 1.024-.044 2.515-.045zm4.988 1.328a.96.96 0 1 0 0 1.92.96.96 0 0 0 0-1.92m-4.27 1.122a4.109 4.109 0 1 0 0 8.217 4.109 4.109 0 0 0 0-8.217m0 1.441a2.667 2.667 0 1 1 0 5.334 2.667 2.667 0 0 1 0-5.334" />
      </svg>
    </div>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/carrinho.js"></script>
  <script>
    function renderizarCarrinho() {
      const carrinho = getCarrinho();
      const container = document.getElementById('carrinho-conteudo');

      if (carrinho.length === 0) {
        container.innerHTML = `
        <div class="carrinho-vazio">
          <p>Seu carrinho está vazio 😕</p>
          <a href="index.html" class="btn btn-laranja">Ver cardápio</a>
        </div>`;
        return;
      }

      const itensHTML = carrinho.map(item => {
        const preco = item.preco_promocional || item.preco;
        const subtotal = (parseFloat(preco) * item.quantidade).toFixed(2);
        return `
        <div class="item-carrinho">
          <img src="${item.imagem_url}" alt="${item.nome}">
          <div class="item-info">
            <h3>${item.nome}</h3>
            <p>R$ ${parseFloat(preco).toFixed(2)} cada</p>
          </div>
          <div class="item-quantidade">
            <button onclick="mudarQuantidade(${item.id}, ${item.quantidade - 1})">−</button>
            <span>${item.quantidade}</span>
            <button onclick="mudarQuantidade(${item.id}, ${item.quantidade + 1})">+</button>
          </div>
          <strong style="min-width:80px; text-align:right;">R$ ${subtotal}</strong>
          <button class="btn-remover" onclick="removerItem(${item.id})">🗑️</button>
        </div>`;
      }).join('');

      const total = calcularTotal();

      const resumoHTML = `
      <div class="carrinho-resumo">
        <div class="resumo-linha">
          <span>${carrinho.reduce((s, i) => s + i.quantidade, 0)} itens</span>
        </div>
        <div class="resumo-total">
          <span>Total</span>
          <span>R$ ${total}</span>
        </div>
        <button class="btn btn-verde" style="width:100%; margin-top:16px;" onclick="irParaPedido()">
          Finalizar Pedido →
        </button>
      </div>`;

      container.innerHTML = itensHTML + resumoHTML;
    }

    function mudarQuantidade(id, novaQtd) {
      alterarQuantidade(id, novaQtd);
      renderizarCarrinho();
    }

    function removerItem(id) {
      removerDoCarrinho(id);
      renderizarCarrinho();
    }

    function irParaPedido() {
      const token = localStorage.getItem('token');
      if (!token) {
        alert('Você precisa estar logado para finalizar o pedido!');
        window.location.href = 'login.html';
        return;
      }
      window.location.href = 'pedido.html';
    }

    renderizarCarrinho();
    const navPedidos = document.getElementById('nav-pedidos');
    if (localStorage.getItem('token') && navPedidos) {
      navPedidos.style.display = 'inline';
    }
  </script>

</body>

</html>
